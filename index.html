<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mintlify Project</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header id="navbar">
        <div class="logo">
            <img src="photos/mintlifylogo.png" alt="Logo">
        </div>
        <div class="nav">
            <a href="#">Resources</a>
            <a href="#">Documentation</a>
            <a href="">Customers</a>
            <a href="">Blog</a>
            <a href="">Pricing</a>
        </div>
        <div class="buttons">
            <button class="button1">Contact sales</button>
            <button class="button2">Start for free</button>
        </div>
    </header> 

    <br><br><br><br>

    <main id="main_material">
        <div class="heading">
            <h1>The Intelligent <br> Knowledge Platform</h1><br>
            <p>Helping teams create and maintain world-class <br> documentation built for both humans and AI</p>
        </div>
        
        <div class="form">
            <input type="email" id="email" name="email" placeholder="Email address" required>
            <button type="submit" id="ctr">Start now</button>
        </div>
    </main>
    
    <div id="img">
        <img  src="photos/hero-image-light.svg" alt="function image">
    </div>
    <div id="logos">
            <img src="photos/Anthropic_Logo.png" alt="Anthropic">
            <img src="photos/coinbase_logo.png" alt="Coinbase">
            <img src="photos/Microsoft-logo.png" alt="Microsoft">
            <img src="photos/perplexity_logo.png" alt="Perplexity">
            <img src="photos/Hubspot_logo.png" alt="Hubspot">
            <img src="photos/notion_logo.png" alt="Notion">
            <img src="photos/paypal_logo.png" alt="Paypal">
            <img src="photos/Lovable_Logo.png" alt="Lovable">
    </div>
</body>
</html>
